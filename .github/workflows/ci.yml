name: CI
on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]
jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Type check
              run: bun run type-check
            - name: Lint
              run: bun run lint
            - name: Build
              run: bun run build
            - name: Test
              run: bun run test
